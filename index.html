<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Tiers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 500px;
        }
        th, td {
            border: 1px solid #555;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #7d00ff;
        }
        tr:nth-child(even) { background-color: #2a2a2a; }
        tr:nth-child(odd) { background-color: #1f1f1f; }

        /* Tierfarben */
        .tier-HT1 { background-color: #7d00ff; color: #fff; }
        .tier-LT1 { background-color: #ff4444; color: #fff; }
        .tier-HT2 { background-color: #ff894a; color: #000; }
        .tier-LT2 { background-color: #ffd33b; color: #000; }
        .tier-HT3 { background-color: #55ff8a; color: #000; }
        .tier-LT3 { background-color: #888888; color: #000; }
        .tier-HT4 { background-color: #4444ff; color: #fff; }
        .tier-LT4 { background-color: #aa44aa; color: #fff; }
        .tier-HT5 { background-color: #ffaa00; color: #000; }
        .tier-LT5 { background-color: #00ffaa; color: #000; }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Tier</th>
            <th>Ingame Name</th>
            <th>Punkte</th>
        </tr>
        <tr class="tier-HT1"><td>HT1</td><td>Spieler1</td><td>60</td></tr>
        <tr class="tier-LT1"><td>LT1</td><td>Spieler2</td><td>45</td></tr>
        <tr class="tier-HT2"><td>HT2</td><td>Spieler3</td><td>30</td></tr>
        <tr class="tier-LT2"><td>LT2</td><td>Spieler4</td><td>20</td></tr>
        <tr class="tier-HT3"><td>HT3</td><td>Spieler5</td><td>10</td></tr>
        <tr class="tier-LT3"><td>LT3</td><td>Spieler6</td><td>8</td></tr>
        <tr class="tier-HT4"><td>HT4</td><td>Spieler7</td><td>4</td></tr>
        <tr class="tier-LT4"><td>LT4</td><td>Spieler8</td><td>3</td></tr>
        <tr class="tier-HT5"><td>HT5</td><td>Spieler9</td><td>2</td></tr>
        <tr class="tier-LT5"><td>LT5</td><td>Spieler10</td><td>1</td></tr>
    </table>
</body>
</html>
