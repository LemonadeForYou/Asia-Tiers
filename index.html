<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Asia Tiers | Elite PvP Rankings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: #07070f;
      overflow-x: hidden;
      position: relative;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
      background: radial-gradient(circle at 30% 10%, #0c0c1a, #020208);
    }

    .glow-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, rgba(138, 43, 226, 0.08), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    .main-wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
      position: relative;
      z-index: 2;
    }

    .navbar {
      position: sticky;
      top: 16px;
      z-index: 100;
      background: rgba(10, 10, 22, 0.7);
      backdrop-filter: blur(18px);
      border-radius: 48px;
      padding: 0.9rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
    }

    .brand h1 {
      font-size: 1.9rem;
      background: linear-gradient(135deg, #f5e7a3, #e6b422, #c9951e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
    }

    .sub {
      font-size: 0.75rem;
      color: #b9b9e0;
      letter-spacing: 0.5px;
    }

    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .search-box {
      background: rgba(25, 25, 45, 0.85);
      border: 1px solid rgba(212, 175, 55, 0.5);
      border-radius: 44px;
      padding: 0.55rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      backdrop-filter: blur(8px);
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 0.9rem;
      width: 180px;
    }

    .search-box input::placeholder {
      color: #b0b0d0;
    }

    select, .sort-btn {
      background: rgba(25, 25, 45, 0.85);
      border: 1px solid rgba(212, 175, 55, 0.5);
      border-radius: 44px;
      padding: 0.55rem 1.3rem;
      color: white;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    select:hover, .sort-btn:hover {
      background: rgba(60, 55, 90, 0.95);
      border-color: #d4af37;
      transform: scale(0.98);
    }

    .player-cards-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .player-card {
      background: rgba(14, 14, 28, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 36px;
      padding: 1.6rem 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      animation: fadeSlideUp 0.5s ease forwards;
      opacity: 0;
      box-shadow: 0 12px 25px -8px rgba(0, 0, 0, 0.4);
    }

    .player-card:hover {
      transform: translateY(-4px);
      background: rgba(25, 25, 50, 0.8);
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.6);
    }

    .player-card.top-1 {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.25), rgba(100, 70, 20, 0.45));
      border: 2px solid #f5b042;
      box-shadow: 0 0 35px rgba(212, 175, 55, 0.6);
    }
    .player-card.top-2 {
      background: linear-gradient(135deg, rgba(180, 180, 210, 0.22), rgba(100, 100, 140, 0.4));
      border: 2px solid #c0c0d8;
      box-shadow: 0 0 28px rgba(192, 192, 216, 0.5);
    }
    .player-card.top-3 {
      background: linear-gradient(135deg, rgba(205, 150, 80, 0.22), rgba(120, 80, 40, 0.4));
      border: 2px solid #cd7a32;
      box-shadow: 0 0 25px rgba(205, 122, 50, 0.5);
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .floating {
      animation: floatAnim 3.2s ease-in-out infinite;
    }
    @keyframes floatAnim {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    .card-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .rank-block {
      min-width: 95px;
      text-align: center;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 28px;
      padding: 0.5rem 0.8rem;
      backdrop-filter: blur(4px);
    }
    .rank-number {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff, #e6b422);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 15px rgba(230, 180, 34, 0.6);
      line-height: 1;
      display: inline-block;
    }

    .avatar-large {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #d4af37;
      background: #1e1e2a;
      box-shadow: 0 8px 18px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    .player-card:hover .avatar-large {
      transform: scale(1.02);
    }

    .player-info {
      flex: 2;
      min-width: 200px;
    }
    .player-name {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #ffffff, #e0e0ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 6px;
    }
    .player-sub {
      display: flex;
      gap: 1rem;
      align-items: baseline;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .category-text {
      font-size: 0.8rem;
      color: #aaaad4;
      background: rgba(255,255,255,0.05);
      padding: 0.25rem 0.9rem;
      border-radius: 40px;
      display: inline-block;
    }
    .region-badge {
      background: rgba(138, 43, 226, 0.35);
      border-radius: 40px;
      padding: 0.25rem 1.1rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #cdcdff;
      border: 1px solid rgba(212, 175, 55, 0.4);
      backdrop-filter: blur(4px);
    }

    .tier-section {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
    }
    .tier-mini-card {
      background: rgba(8, 8, 20, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 0.9rem 2.2rem;
      text-align: center;
      width: 100%;
      max-width: 280px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      transition: all 0.2s;
    }
    .tier-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #aaaacf;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }
    .tier-rank-value {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .tier-Splus .tier-rank-value { color: #f5b042; text-shadow: 0 0 22px #f5b042; }
    .tier-S .tier-rank-value { color: #f39c12; text-shadow: 0 0 18px #f39c12; }
    .tier-A .tier-rank-value { color: #4caf50; text-shadow: 0 0 14px #4caf50; }
    .tier-B .tier-rank-value { color: #42a5f5; text-shadow: 0 0 12px #42a5f5; }
    .tier-C .tier-rank-value { color: #9e9e9e; text-shadow: 0 0 10px #9e9e9e; }

    .tier-mini-card.tier-Splus { border-color: #f5b042; box-shadow: 0 0 20px rgba(245,176,66,0.45); }
    .tier-mini-card.tier-S { border-color: #f39c12; box-shadow: 0 0 16px rgba(243,156,18,0.4); }
    .tier-mini-card.tier-A { border-color: #4caf50; box-shadow: 0 0 14px rgba(76,175,80,0.35); }
    .tier-mini-card.tier-B { border-color: #42a5f5; box-shadow: 0 0 12px rgba(66,165,245,0.35); }
    .tier-mini-card.tier-C { border-color: #9e9e9e; box-shadow: 0 0 10px rgba(158,158,158,0.25); }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: #ccd;
      background: rgba(15,15,30,0.5);
      border-radius: 48px;
      font-size: 1.1rem;
    }

    @media (max-width: 780px) {
      .main-wrapper { padding: 0.8rem 1rem 2rem; }
      .card-row { flex-direction: column; text-align: center; gap: 1rem; }
      .rank-block { min-width: 70px; }
      .rank-number { font-size: 2.5rem; }
      .player-info { text-align: center; }
      .player-sub { justify-content: center; }
      .avatar-large { width: 65px; height: 65px; }
      .player-name { font-size: 1.4rem; }
      .tier-mini-card { max-width: 240px; padding: 0.7rem 1.5rem; }
      .tier-rank-value { font-size: 2rem; }
      .navbar { flex-direction: column; align-items: stretch; text-align: center; border-radius: 36px; }
      .controls { justify-content: center; }
      .player-card { padding: 1.2rem; }
    }
    @media (max-width: 480px) {
      .rank-number { font-size: 2.2rem; }
      .rank-block { min-width: 60px; padding: 0.3rem 0.5rem; }
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #7a7aac;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="glow-overlay"></div>

<div class="main-wrapper">
  <div class="navbar">
    <div class="brand">
      <h1>⚔️ ASIA TIERS</h1>
      <div class="sub">Competitive PvP Rankings · Global Leaderboard</div>
    </div>
    <div class="controls">
      <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search player...">
      </div>
      <select id="tierFilter">
        <option value="all">All Tiers</option>
        <option value="S+">S+</option>
        <option value="S">S</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
      <div class="sort-btn" id="sortRankBtn">⬇️ Sort by Rank</div>
    </div>
  </div>

  <div id="playersCardsContainer" class="player-cards-container"></div>
  <footer>© Asia Tiers — elite MCTiers-style showcase | live rankings</footer>
</div>

<script>
  function getAvatarUrl(username) {
    return `https://api.dicebear.com/9.x/initials/svg?seed=${encodeURIComponent(username)}&backgroundColor=2c2c3a&radius=50&fontSize=36&fontWeight=600&colors=gold,purple,orange&size=80`;
  }

  const namePool = [
    "ItzRealMe", "coldified", "Swight", "janekv", "BlvckWlf", "Kylaz", "ninorc15", "Lurrn",
    "Arsakha", "yMiau", "CreqmXD", "FrostBlade", "ShadowReap", "VoidWalker", "StormSage",
    "RavenLock", "ZenithX", "MirageOP", "PhantomKite", "EmberFury", "TitanSlayer", "NovaRift",
    "Zephyr_", "LunarHaze", "AshenOne", "DuskBringer", "Sylphie", "Kurogane", "YukiDesu",
    "Raijin_", "SenpaiPvP", "Rekkles", "ScoutZero", "Matsuri", "OrochiX", "Tempest"
  ];
  
  let players = [];
  for (let i = 1; i <= 38; i++) {
    let username;
    if (i <= namePool.length) username = namePool[i-1];
    else username = `Elite${i}`;
    let tier;
    if (i === 1) tier = "S+";
    else if (i === 2) tier = "S+";
    else if (i === 3) tier = "S+";
    else if (i <= 9) tier = "S";
    else if (i <= 17) tier = "A";
    else if (i <= 26) tier = "B";
    else tier = "C";
    
    if (username === "Rekkles") tier = "S+";
    if (username === "ScoutZero") tier = "S+";
    if (username === "MirageOP") tier = "A";
    if (username === "Kurogane") tier = "B";
    
    let points = 0;
    let categoryTitle = "Combat Master";
    if (tier === "S+") points = Math.floor(Math.random() * (400 - 310) + 310);
    else if (tier === "S") points = Math.floor(Math.random() * (300 - 230) + 230);
    else if (tier === "A") points = Math.floor(Math.random() * (220 - 160) + 160);
    else if (tier === "B") points = Math.floor(Math.random() * (150 - 95) + 95);
    else points = Math.floor(Math.random() * (85 - 35) + 35);
    
    if (tier === "S+") categoryTitle = "Elite Grandmaster";
    else if (tier === "S") categoryTitle = "Combat Master";
    else if (tier === "A") categoryTitle = "Combat Ace";
    else if (tier === "B") categoryTitle = "Combat Veteran";
    else categoryTitle = "Combat Rookie";
    
    const regions = ["NA", "EU", "ASIA", "KR", "OCE"];
    const region = regions[(i % regions.length)];
    
    players.push({
      rank: i,
      username: username,
      tier: tier,
      category: `${categoryTitle} (${points} pts)`,
      region: region,
      avatarUrl: getAvatarUrl(username)
    });
  }
  
  players.push({ rank: 39, username: "GodlyRift", tier: "S+", category: "Elite Grandmaster (425 pts)", region: "NA", avatarUrl: getAvatarUrl("GodlyRift") });
  players.push({ rank: 40, username: "OmegaFlash", tier: "S", category: "Combat Master (312 pts)", region: "EU", avatarUrl: getAvatarUrl("OmegaFlash") });
  
  players.sort((a,b) => a.rank - b.rank);
  players.forEach((p, idx) => { p.rank = idx + 1; });
  
  let currentSearch = '';
  let currentTier = 'all';
  
  const container = document.getElementById('playersCardsContainer');
  const searchInput = document.getElementById('searchInput');
  const tierFilter = document.getElementById('tierFilter');
  const sortBtn = document.getElementById('sortRankBtn');
  
  function getTierStyleClass(tier) {
    switch(tier) {
      case 'S+': return 'tier-Splus';
      case 'S': return 'tier-S';
      case 'A': return 'tier-A';
      case 'B': return 'tier-B';
      default: return 'tier-C';
    }
  }
  
  function getCardTopClass(rank) {
    if (rank === 1) return 'top-1';
    if (rank === 2) return 'top-2';
    if (rank === 3) return 'top-3';
    return '';
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }
  
  function renderCards() {
    let filtered = [...players];
    if (currentSearch.trim() !== "") {
      const lower = currentSearch.toLowerCase();
      filtered = filtered.filter(p => p.username.toLowerCase().includes(lower));
    }
    if (currentTier !== 'all') {
      filtered = filtered.filter(p => p.tier === currentTier);
    }
    filtered.sort((a,b) => a.rank - b.rank);
    
    if (filtered.length === 0) {
      container.innerHTML = `<div class="no-results">🏆 No warriors found in this tier. 🏆</div>`;
      return;
    }
    
    let html = '';
    filtered.forEach((player, idx) => {
      const rank = player.rank;
      const tierClass = getTierStyleClass(player.tier);
      const cardTopClass = getCardTopClass(rank);
      const isTop3 = rank === 1 || rank === 2 || rank === 3;
      const floatingClass = isTop3 ? 'floating' : '';
      const animationDelay = (idx * 0.04).toFixed(2);
      
      html += `
        <div class="player-card ${cardTopClass} ${floatingClass}" style="animation-delay: ${animationDelay}s;">
          <div class="card-row">
            <div class="rank-block">
              <div class="rank-number">${rank}</div>
            </div>
            <img class="avatar-large" src="${player.avatarUrl}" alt="avatar" loading="lazy" onerror="this.src='https://api.dicebear.com/9.x/identicon/svg?seed=${player.username}'">
            <div class="player-info">
              <div class="player-name">${escapeHtml(player.username)}</div>
              <div class="player-sub">
                <span class="category-text">⚔️ ${escapeHtml(player.category)}</span>
                <span class="region-badge">🌍 ${escapeHtml(player.region)}</span>
              </div>
            </div>
          </div>
          <div class="tier-section">
            <div class="tier-mini-card ${tierClass}">
              <div class="tier-label">TIERS</div>
              <div class="tier-rank-value">${player.tier}</div>
            </div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }
  
  function updateAll() {
    renderCards();
  }
  
  searchInput.addEventListener('input', (e) => { currentSearch = e.target.value; updateAll(); });
  tierFilter.addEventListener('change', (e) => { currentTier = e.target.value; updateAll(); });
  sortBtn.addEventListener('click', () => {
    updateAll();
    sortBtn.style.transform = "scale(0.96)";
    setTimeout(() => sortBtn.style.transform = "", 150);
  });
  
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let width, height;
  let particles = [];
  let stars = [];
  
  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }
  
  class Particle {
    constructor() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.radius = Math.random() * 2.5 + 1;
      this.alpha = Math.random() * 0.4 + 0.2;
      this.vx = (Math.random() - 0.5) * 0.2;
      this.vy = (Math.random() - 0.5) * 0.15;
      this.color = `rgba(212, 175, 55, ${this.alpha * 0.6})`;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0) this.x = width;
      if (this.x > width) this.x = 0;
      if (this.y < 0) this.y = height;
      if (this.y > height) this.y = 0;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
  }
  
  class Star {
    constructor() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.size = Math.random() * 1.8;
      this.twinkle = Math.random() * 0.5 + 0.3;
    }
    draw(time) {
      const intensity = this.twinkle + Math.sin(time * 0.002 + this.x) * 0.2;
      ctx.fillStyle = `rgba(255, 235, 180, ${intensity * 0.7})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function initBackground() {
    resizeCanvas();
    particles = [];
    stars = [];
    for (let i = 0; i < 110; i++) particles.push(new Particle());
    for (let i = 0; i < 190; i++) stars.push(new Star());
  }
  
  let animationTime = 0;
  function animateBackground() {
    if (!ctx) return;
    ctx.clearRect(0, 0, width, height);
    const grad = ctx.createLinearGradient(0, 0, width*0.8, height);
    grad.addColorStop(0, '#03030c');
    grad.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
    for (let s of stars) {
      s.draw(animationTime);
    }
    for (let p of particles) {
      p.update();
      p.draw();
    }
    animationTime += 16;
    requestAnimationFrame(animateBackground);
  }
  
  window.addEventListener('resize', () => {
    resizeCanvas();
    initBackground();
  });
  
  initBackground();
  animateBackground();
  updateAll();
</script>
</body>
</html>
