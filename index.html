<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Asia Tiers | Elite PvP Rankings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0a0a14;
      overflow-x: hidden;
      position: relative;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
      background: radial-gradient(circle at 30% 10%, #0c0c1a, #020208);
    }

    .glow-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, rgba(100, 60, 200, 0.08), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    .main-wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
      position: relative;
      z-index: 2;
    }

    .navbar {
      position: sticky;
      top: 16px;
      z-index: 100;
      background: rgba(12, 12, 25, 0.7);
      backdrop-filter: blur(18px);
      border-radius: 40px;
      padding: 0.9rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(212, 175, 55, 0.25);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }

    .brand h1 {
      font-size: 1.9rem;
      background: linear-gradient(135deg, #f5e7a3, #e6b422, #c9951e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
    }

    .sub {
      font-size: 0.75rem;
      color: #b9b9e0;
      letter-spacing: 0.5px;
    }

    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .search-box {
      background: rgba(25, 25, 45, 0.8);
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 40px;
      padding: 0.55rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      backdrop-filter: blur(8px);
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 0.9rem;
      width: 180px;
    }

    .search-box input::placeholder {
      color: #b0b0d0;
    }

    select, .sort-btn {
      background: rgba(25, 25, 45, 0.85);
      border: 1px solid rgba(212, 175, 55, 0.5);
      border-radius: 40px;
      padding: 0.55rem 1.3rem;
      color: white;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    select:hover, .sort-btn:hover {
      background: rgba(60, 55, 90, 0.9);
      border-color: #d4af37;
      transform: scale(0.98);
    }

    .player-cards-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .player-card {
      background: rgba(15, 15, 30, 0.6);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      animation: fadeSlideUp 0.5s ease forwards;
      opacity: 0;
    }

    .player-card:hover {
      transform: translateY(-4px);
      background: rgba(25, 25, 50, 0.75);
      border-color: rgba(212, 175, 55, 0.3);
    }

    .card-top-section {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .rank-banner {
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      border-radius: 28px;
      padding: 0.8rem 1.4rem;
      min-width: 85px;
      text-align: center;
      border: 1px solid rgba(212, 175, 55, 0.4);
      box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    }

    .rank-number-large {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #e6b422);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(230, 180, 34, 0.5);
    }

    .player-avatar-large {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #d4af37;
      background: #1e1e2a;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }

    .player-card:hover .player-avatar-large {
      transform: scale(1.03);
    }

    .player-info-center {
      flex: 1;
      min-width: 160px;
    }

    .username-large {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #fff, #e0e0ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .player-category {
      font-size: 0.8rem;
      color: #a0a0c5;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .region-badge {
      background: rgba(100, 70, 150, 0.5);
      border-radius: 40px;
      padding: 0.4rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #cdcdff;
      border: 1px solid rgba(212, 175, 55, 0.4);
      backdrop-filter: blur(4px);
    }

    .card-bottom-section {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
    }

    .tier-mini-card {
      background: rgba(10, 10, 22, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 1rem 2rem;
      text-align: center;
      width: 100%;
      max-width: 280px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      transition: all 0.2s;
    }

    .tier-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #9a9ac0;
      margin-bottom: 0.5rem;
    }

    .tier-rank-large {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .tier-Splus .tier-rank-large { 
      color: #f5b042; 
      text-shadow: 0 0 20px #f5b042, 0 0 8px #d4af37;
    }
    .tier-S .tier-rank-large { 
      color: #f39c12; 
      text-shadow: 0 0 16px #f39c12;
    }
    .tier-A .tier-rank-large { 
      color: #4caf50; 
      text-shadow: 0 0 12px #4caf50;
    }
    .tier-B .tier-rank-large { 
      color: #42a5f5; 
      text-shadow: 0 0 10px #42a5f5;
    }
    .tier-C .tier-rank-large { 
      color: #9e9e9e; 
      text-shadow: 0 0 8px #9e9e9e;
    }

    .tier-mini-card.tier-Splus { border-color: #f5b042; box-shadow: 0 0 18px rgba(245,176,66,0.4); }
    .tier-mini-card.tier-S { border-color: #f39c12; box-shadow: 0 0 14px rgba(243,156,18,0.35); }
    .tier-mini-card.tier-A { border-color: #4caf50; box-shadow: 0 0 12px rgba(76,175,80,0.3); }
    .tier-mini-card.tier-B { border-color: #42a5f5; box-shadow: 0 0 10px rgba(66,165,245,0.3); }
    .tier-mini-card.tier-C { border-color: #9e9e9e; box-shadow: 0 0 8px rgba(158,158,158,0.2); }

    .top-1-card {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(100, 70, 20, 0.35));
      border: 1px solid #f5b042;
      box-shadow: 0 0 28px rgba(212, 175, 55, 0.5);
      transform: scale(1.01);
    }

    .top-2-card {
      background: linear-gradient(135deg, rgba(180, 180, 210, 0.18), rgba(100, 100, 130, 0.3));
      border: 1px solid #c0c0d0;
      box-shadow: 0 0 22px rgba(192, 192, 208, 0.4);
    }

    .top-3-card {
      background: linear-gradient(135deg, rgba(205, 150, 80, 0.18), rgba(120, 80, 40, 0.3));
      border: 1px solid #cd7a32;
      box-shadow: 0 0 20px rgba(205, 122, 50, 0.4);
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .floating {
      animation: floatAnim 3s ease-in-out infinite;
    }

    @keyframes floatAnim {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: #ccd;
      font-size: 1.2rem;
      background: rgba(15,15,30,0.5);
      border-radius: 32px;
    }

    @media (max-width: 780px) {
      .main-wrapper { padding: 0.8rem 1rem 2rem; }
      .card-top-section { flex-direction: column; text-align: center; }
      .player-info-center { text-align: center; }
      .region-badge { display: inline-block; margin-top: 8px; }
      .rank-banner { align-self: center; }
      .username-large { font-size: 1.3rem; }
      .player-avatar-large { width: 60px; height: 60px; }
      .tier-mini-card { max-width: 220px; padding: 0.8rem 1rem; }
      .tier-rank-large { font-size: 2rem; }
      .navbar { flex-direction: column; align-items: stretch; text-align: center; }
      .controls { justify-content: center; }
    }

    @media (max-width: 480px) {
      .player-card { padding: 1rem; }
      .rank-number-large { font-size: 1.8rem; }
      .rank-banner { padding: 0.5rem 1rem; min-width: 70px; }
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #7a7aac;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="glow-overlay"></div>

<div class="main-wrapper">
  <div class="navbar">
    <div class="brand">
      <h1>🏆 ASIA TIERS</h1>
      <div class="sub">Competitive PvP Rankings · Global Elite</div>
    </div>
    <div class="controls">
      <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search warrior...">
      </div>
      <select id="tierFilter">
        <option value="all">All Tiers</option>
        <option value="S+">S+</option>
        <option value="S">S</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
      <div class="sort-btn" id="sortRankBtn">⬇️ Sort by Rank</div>
    </div>
  </div>

  <div id="playersCardsContainer" class="player-cards-container"></div>
  <footer>© Asia Tiers — elite rankings | premium player showcase</footer>
</div>

<script>
  function getAvatarUrl(username) {
    return `https://api.dicebear.com/9.x/initials/svg?seed=${encodeURIComponent(username)}&backgroundColor=2c2c3a&radius=50&fontSize=36&fontWeight=600&colors=gold,orange,purple`;
  }

  const namePool = [
    "ItzRealPro", "CreqmXD", "FrostBlade", "ShadowReap", "VoidWalker", "StormSage", "RavenLock", "ZenithX", 
    "MirageOP", "PhantomKite", "EmberFury", "TitanSlayer", "NovaRift", "Zephyr_", "LunarHaze", "AshenOne", 
    "DuskBringer", "Sylphie", "Kurogane", "YukiDesu", "Raijin_", "SenpaiPvP", "Rekkles", "FakerLite", 
    "ScoutZero", "Matsuri", "OrochiX", "Tempest", "KarmaVortex", "BlazeFury"
  ];

  let players = [];
  for (let i = 1; i <= 32; i++) {
    let username;
    if (i <= namePool.length) username = namePool[i-1];
    else username = `Elite${i}`;
    let tier;
    if (i === 1) tier = "S+";
    else if (i === 2) tier = "S+";
    else if (i === 3) tier = "S+";
    else if (i <= 8) tier = "S";
    else if (i <= 14) tier = "A";
    else if (i <= 21) tier = "B";
    else tier = "C";
    if (username === "Rekkles") tier = "S+";
    if (username === "ScoutZero") tier = "S+";
    if (username === "MirageOP") tier = "A";
    if (username === "Kurogane") tier = "B";
    players.push({
      rank: i,
      username: username,
      tier: tier,
      category: "Combat",
      region: "NA",
      avatarUrl: getAvatarUrl(username)
    });
  }
  players.push({ rank: 33, username: "GodlyRift", tier: "S+", category: "Combat", region: "EU", avatarUrl: getAvatarUrl("GodlyRift") });
  players.push({ rank: 34, username: "OmegaFlash", tier: "S", category: "Combat", region: "ASIA", avatarUrl: getAvatarUrl("OmegaFlash") });
  players.push({ rank: 35, username: "CrimsonFang", tier: "A", category: "Combat", region: "NA", avatarUrl: getAvatarUrl("CrimsonFang") });
  players.sort((a,b) => a.rank - b.rank);
  players.forEach((p, idx) => { p.rank = idx + 1; });
  
  let currentSearch = '';
  let currentTier = 'all';
  
  const container = document.getElementById('playersCardsContainer');
  const searchInput = document.getElementById('searchInput');
  const tierFilter = document.getElementById('tierFilter');
  const sortBtn = document.getElementById('sortRankBtn');
  
  function getTierStyleClass(tier) {
    switch(tier) {
      case 'S+': return 'tier-Splus';
      case 'S': return 'tier-S';
      case 'A': return 'tier-A';
      case 'B': return 'tier-B';
      default: return 'tier-C';
    }
  }
  
  function getCardTopClass(rank) {
    if (rank === 1) return 'top-1-card';
    if (rank === 2) return 'top-2-card';
    if (rank === 3) return 'top-3-card';
    return '';
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }
  
  function renderCards() {
    let filtered = [...players];
    if (currentSearch.trim() !== "") {
      const lower = currentSearch.toLowerCase();
      filtered = filtered.filter(p => p.username.toLowerCase().includes(lower));
    }
    if (currentTier !== 'all') {
      filtered = filtered.filter(p => p.tier === currentTier);
    }
    filtered.sort((a,b) => a.rank - b.rank);
    
    if (filtered.length === 0) {
      container.innerHTML = `<div class="no-results">⚔️ No warriors found in this tier ⚔️</div>`;
      return;
    }
    
    let html = '';
    filtered.forEach((player, idx) => {
      const rank = player.rank;
      const tierClass = getTierStyleClass(player.tier);
      const cardTopClass = getCardTopClass(rank);
      const isTop3 = rank === 1 || rank === 2 || rank === 3;
      const floatingClass = isTop3 ? 'floating' : '';
      const animationDelay = (idx * 0.05).toFixed(2);
      
      html += `
        <div class="player-card ${cardTopClass}" style="animation-delay: ${animationDelay}s;">
          <div class="card-top-section">
            <div class="rank-banner">
              <div class="rank-number-large">${rank}.</div>
            </div>
            <img class="player-avatar-large" src="${player.avatarUrl}" alt="avatar" loading="lazy" onerror="this.src='https://api.dicebear.com/9.x/identicon/svg?seed=${player.username}'">
            <div class="player-info-center">
              <div class="username-large">${escapeHtml(player.username)}</div>
              <div class="player-category">
                <span>⚔️ ${escapeHtml(player.category)}</span>
                <span>🎮 PvP</span>
              </div>
            </div>
            <div class="region-badge">
              🌍 ${escapeHtml(player.region)}
            </div>
          </div>
          <div class="card-bottom-section">
            <div class="tier-mini-card ${tierClass}">
              <div class="tier-label">TIERS</div>
              <div class="tier-rank-large">${player.tier}</div>
            </div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }
  
  function updateAll() {
    renderCards();
  }
  
  searchInput.addEventListener('input', (e) => { currentSearch = e.target.value; updateAll(); });
  tierFilter.addEventListener('change', (e) => { currentTier = e.target.value; updateAll(); });
  sortBtn.addEventListener('click', () => {
    updateAll();
    sortBtn.style.transform = "scale(0.96)";
    setTimeout(() => sortBtn.style.transform = "", 150);
  });
  
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let width, height;
  let particles = [];
  let stars = [];
  
  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }
  
  class Particle {
    constructor() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.radius = Math.random() * 2.5 + 1;
      this.alpha = Math.random() * 0.4 + 0.2;
      this.vx = (Math.random() - 0.5) * 0.25;
      this.vy = (Math.random() - 0.5) * 0.15;
      this.color = `rgba(212, 175, 55, ${this.alpha * 0.6})`;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0) this.x = width;
      if (this.x > width) this.x = 0;
      if (this.y < 0) this.y = height;
      if (this.y > height) this.y = 0;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
  }
  
  class Star {
    constructor() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.size = Math.random() * 1.8;
      this.twinkle = Math.random() * 0.5 + 0.3;
    }
    draw(time) {
      const intensity = this.twinkle + Math.sin(time * 0.002 + this.x) * 0.2;
      ctx.fillStyle = `rgba(255, 240, 180, ${intensity * 0.7})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function initBackground() {
    resizeCanvas();
    particles = [];
    stars = [];
    for (let i = 0; i < 110; i++) particles.push(new Particle());
    for (let i = 0; i < 180; i++) stars.push(new Star());
  }
  
  let animationTime = 0;
  function animateBackground() {
    if (!ctx) return;
    ctx.clearRect(0, 0, width, height);
    const grad = ctx.createLinearGradient(0, 0, width*0.8, height);
    grad.addColorStop(0, '#03030c');
    grad.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
    for (let s of stars) {
      s.draw(animationTime);
    }
    for (let p of particles) {
      p.update();
      p.draw();
    }
    animationTime += 16;
    requestAnimationFrame(animateBackground);
  }
  
  window.addEventListener('resize', () => {
    resizeCanvas();
    initBackground();
  });
  
  initBackground();
  animateBackground();
  updateAll();
</script>
</body>
</html>
